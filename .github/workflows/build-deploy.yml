name: Build

on:
  push:
    branches:
      - main
      - deploy
    paths-ignore:
      - 'README.md'
      - '.gitignore'
  workflow_dispatch:  # 允许手动触发

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # 仅验证构建是否成功，产物由 Cloudflare Pages 自行构建部署
      - name: Build verify
        run: npm run build
